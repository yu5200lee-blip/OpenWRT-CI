name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *' # 每日定时运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'

      - name: Add Upstream
        run: git remote add upstream https://github.com/VIKINGYFY/OpenWRT-CI.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Merge Upstream
        run: git merge upstream/main --allow-unrelated-histories || true

      - name: Push Changes
        run: git push origin main